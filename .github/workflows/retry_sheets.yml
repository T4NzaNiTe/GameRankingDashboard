name: Retry Google Sheets Upload

concurrency:
  group: git-sync-queue
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [trigger-retry]
  workflow_dispatch: 

jobs:
  retry-sheets:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 🚀 [궁극의 백신] Node 24 내장 fetch(undici) 강제 비활성화! (Premature close 영구 차단)
      NODE_OPTIONS: "--no-experimental-fetch"
    defaults:
      run:
        shell: bash
    permissions:
      contents: write 
      id-token: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Create credentials.json from Secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Retry Script
        run: node retry_sheets.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 스크립트 실행 시에도 확실하게 환경변수 전달
          NODE_OPTIONS: "--no-experimental-fetch"

      - name: Commit and Push Updated Pending Sheets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_sheets.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🧹 Auto-clean pending_sheets.json after successful retry"
          git pull --rebase origin main || true
          git push
