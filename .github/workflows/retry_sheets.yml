name: Retry Google Sheets Upload

concurrency:
  group: git-sync-queue
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [trigger-retry]
  workflow_dispatch: 

jobs:
  retry-sheets:
    # 1. 메인 크롤러와 100% 동일하게 우분투 가상 서버 복귀
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash
    permissions:
      contents: write 
      id-token: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 네트워크 소켓이 가장 안정적인 Node.js 20 LTS 버전으로 전격 교체!
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create credentials.json from Secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      # 3. 🚀 [신의 한 수] 스크립트 실행 전 구글 API 서버와 SSL 소켓 미리 예열(Warm-up)!
      - name: Warm-up Google API Socket & Run Retry Script
        run: |
          curl -s https://www.googleapis.com > /dev/null || true
          node retry_sheets.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and Push Updated Pending Sheets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_sheets.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🧹 Auto-clean pending_sheets.json after successful retry"
          git pull --rebase origin main || true
          git push
