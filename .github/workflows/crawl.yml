name: Daily Game Rank Crawler

on:
  schedule:
    # 매일 한국 시간 기준 아침 9시 정각에 실행 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 버튼 클릭으로 수동 실행 가능하도록 설정

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리 쓰기 권한 (데이터 파일 커밋용)
      pages: write    # GitHub Pages 권한 (웹 대시보드 호스팅)
      id-token: write # Pages 배포 인증
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create credentials.json from Secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Crawler (Update Google Sheet & Local JSON)
        run: node crawler.js

      - name: Commit and Push Updated data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "🚀 Auto-update game rankings"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 모든 파일을 대시보드 웹으로 업로드

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
