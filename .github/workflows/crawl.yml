name: Daily Game Rank Crawler

on:
  workflow_dispatch: 
  repository_dispatch: 
    types: [trigger-crawler]

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash 
    permissions:
      contents: write 
      pages: write    
      id-token: write 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create credentials.json from Secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Crawler (Update Google Sheet & Local JSON)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s https://www.googleapis.com > /dev/null || true # 🚀 소켓 사전 예열 단 한 줄 추가!!!
          node crawler.js

      - name: Commit and Push Updated data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch pending_sheets.json
          git add data.json history/ pending_sheets.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🚀 Auto-update game rankings & history"
          git pull --rebase origin main || true
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Discord on Workflow Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{"content":"🚨 **[시스템 알림] 크롤링 로봇 작동 중 치명적 오류 발생!**\n깃허브 Actions 탭에서 어떤 부분에서 멈췄는지 확인해주세요."}' $DISCORD_WEBHOOK_URL
