name: Daily Game Rank Crawler

on:
  workflow_dispatch: # 수동 실행 버튼
  repository_dispatch: # 외부 모닝콜 알바생(cron-job)이 전화를 걸 수 있는 '직통 전화' 개통
    types: [trigger-crawler]

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리 쓰기 권한 (데이터 파일 커밋용)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create credentials.json from Secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Crawler (Update Google Sheet & Local JSON)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node crawler.js

      - name: Commit and Push Updated data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history/
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "🚀 Auto-update game rankings & history"
          git pull --rebase origin main || true
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 모든 파일을 대시보드 웹으로 업로드

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Discord on Workflow Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{"content":"🚨 **[시스템 알림] 크롤링 로봇 작동 중 치명적 오류 발생!**\n깃허브 Actions 탭에서 어떤 부분에서 멈췄는지 확인해주세요."}' $DISCORD_WEBHOOK_URL
