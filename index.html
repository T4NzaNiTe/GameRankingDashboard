<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 인기/매출 순위 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hide { display: none !important; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 상단 헤더 -->
        <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10 mb-6">
            <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-black text-gray-900 tracking-tight flex items-center">
                    <i class="fa-solid fa-trophy text-yellow-500 mr-3 text-3xl"></i>
                    <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                        Game Rank Dashboard
                    </span>
                </h1>
                <div class="flex items-center gap-4">
                    <div class="flex items-center bg-gray-50 rounded-lg px-3 py-1.5 border border-gray-200">
                        <i class="fa-regular fa-calendar-alt text-gray-500 mr-2"></i>
                        <select id="history-selector" class="bg-transparent border-none text-sm font-semibold text-gray-700 focus:ring-0 cursor-pointer outline-none">
                            <option value="latest">최신 (오늘)</option>
                        </select>
                    </div>
                    <div class="text-sm font-medium text-gray-500 bg-gray-50 px-4 py-2 rounded-full border border-gray-100 flex items-center">
                        <i class="fa-regular fa-clock mr-2 text-indigo-500"></i>
                        <span id="last-updated">업데이트 확인중..</span>
                    </div>
                </div>
            </div>
        </header>

        <div id="loading" class="hide flex flex-col items-center justify-center py-20">
            <div class="spinner mb-4"></div>
            <p class="text-gray-600 font-medium">데이터를 실시간으로 가져오는 중입니다...</p>
        </div>

        <!-- 요약 대시보드 -->
        <div id="summary-dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 hide">
            <!-- 장르 인기순 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <h3 class="text-gray-800 font-bold mb-4 flex items-center">
                    <i class="fa-solid fa-chart-pie text-blue-500 mr-2"></i> 플랫폼별 상위 장르 Top 3
                </h3>
                <div class="space-y-4">
                    <div>
                        <div class="text-xs font-semibold text-gray-500 mb-1">Steam (한국)</div>
                        <div id="steam-genre-summary" class="flex flex-col gap-2"></div>
                    </div>
                    <div>
                        <div class="text-xs font-semibold text-gray-500 mb-1">Play Store (한국)</div>
                        <div id="play-genre-summary" class="flex flex-col gap-2"></div>
                    </div>
                </div>
            </div>

            <!-- 명예의 전당 (장기 흥행) -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                <h3 class="text-gray-800 font-bold mb-4 flex items-center">
                    <i class="fa-solid fa-crown text-yellow-500 mr-2"></i> 명예의 전당 (최장 기간 100위 진입)
                </h3>
                <div class="space-y-4">
                    <div>
                        <div class="text-xs font-semibold text-gray-500 mb-1">Steam (한국)</div>
                        <ul id="steam-hof-list" class="space-y-2 text-sm"></ul>
                    </div>
                    <div>
                        <div class="text-xs font-semibold text-gray-500 mb-1">Play Store (한국)</div>
                        <ul id="play-hof-list" class="space-y-2 text-sm"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2개 분류로 나뉜 메인 테이블 -->
        <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-2 gap-6 hide">
            
            <!-- 1. Steam (한국) -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col h-[600px]">
                <div class="bg-slate-800 p-4 text-white flex items-center justify-between">
                    <h2 class="font-bold text-lg"><i class="fa-brands fa-steam mr-2"></i>Steam (한국)</h2>
                    <span class="text-xs bg-slate-700 px-2 py-1 rounded">Top 100</span>
                </div>
                <div class="overflow-y-auto flex-1 p-0">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="p-3 text-xs font-semibold text-gray-600 w-16 text-center">순위</th>
                                <th class="p-3 text-xs font-semibold text-gray-600">게임명 / 장르</th>
                                <th class="p-3 text-xs font-semibold text-gray-600 text-right">가격 / 할인</th>
                                <th class="p-3 text-xs font-semibold text-gray-600 text-right">개발사</th>
                            </tr>
                        </thead>
                        <tbody id="steam-global-list" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <!-- 2. Play Store (한국) -->
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col h-[600px]">
                <div class="bg-green-500 p-4 text-white flex items-center justify-between">
                    <h2 class="font-bold text-lg"><i class="fa-brands fa-google-play mr-2"></i>Play Store (한국)</h2>
                    <span class="text-xs bg-green-600 px-2 py-1 rounded">Top 100</span>
                </div>
                <div class="overflow-y-auto flex-1 p-0">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="p-3 text-xs font-semibold text-gray-600 w-16 text-center">순위</th>
                                <th class="p-3 text-xs font-semibold text-gray-600">게임명 / 장르</th>
                                <th class="p-3 text-xs font-semibold text-gray-600 text-right">개발사</th>
                            </tr>
                        </thead>
                        <tbody id="play-kr-list" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadHistoryList();
            
            document.getElementById('history-selector').addEventListener('change', (e) => {
                if (e.target.value === 'latest') {
                    fetchRankings('./data.json');
                } else {
                    fetchRankings(`./history/${e.target.value}.json`);
                }
            });
        });

        async function loadHistoryList() {
            try {
                const res = await fetch('./history/history_list.json?t=' + new Date().getTime());
                if (!res.ok) throw new Error("No history");
                const dates = await res.json();
                
                const selector = document.getElementById('history-selector');
                dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    
                    let displayText = date;
                    if (date.includes('_')) {
                        const parts = date.split('_');
                        displayText = `${parts[0]} ${parts[1]}시`;
                    }
                    
                    option.textContent = displayText;
                    selector.appendChild(option);
                });
            } catch (e) {
                console.log("히스토리 목록이 아직 없습니다.");
            }
            fetchRankings('./data.json');
        }

        async function fetchRankings(url) {
            document.getElementById('dashboard').classList.add('hide');
            document.getElementById('summary-dashboard').classList.add('hide');
            document.getElementById('loading').classList.remove('hide');
            
            const lists = {
                steamGlobal: document.getElementById('steam-global-list'),
                playKr: document.getElementById('play-kr-list')
            };
            Object.values(lists).forEach(el => el.innerHTML = '');

            try {
                const res = await fetch(url + '?t=' + new Date().getTime());
                if (!res.ok) {
                    throw new Error("데이터 파일을 찾을 수 없습니다.");
                }
                const data = await res.json();

                document.getElementById('last-updated').textContent = data.lastUpdated + ' 기준';

                const steamData = data.steamGlobal || [];
                const playData = data.playKr || [];

                renderSummary(steamData, playData);
                renderPlayStoreTable(lists.playKr, playData.length ? playData : generateMockData('Play Store (한국)'));
                renderSteamTable(lists.steamGlobal, steamData.length ? steamData : generateMockData('Steam (한국)'));

                document.getElementById('loading').classList.add('hide');
                document.getElementById('summary-dashboard').classList.remove('hide');
                document.getElementById('dashboard').classList.remove('hide');

            } catch (error) {
                console.error("대시보드 로딩 에러:", error);
                alert("해당 날짜의 데이터를 불러오지 못했습니다.");
                document.getElementById('loading').classList.add('hide');
                document.getElementById('summary-dashboard').classList.remove('hide');
                document.getElementById('dashboard').classList.remove('hide');
            }
        }

        function getRankChangeHtml(change) {
            if (change === 'new') return `<span class="text-[10px] font-bold text-pink-500 bg-pink-50 px-1 rounded">NEW</span>`;
            if (change > 0) return `<span class="text-xs font-bold text-red-500 flex items-center justify-center"><i class="fa-solid fa-caret-up mr-0.5"></i>${change}</span>`;
            if (change < 0) return `<span class="text-xs font-bold text-blue-500 flex items-center justify-center"><i class="fa-solid fa-caret-down mr-0.5"></i>${Math.abs(change)}</span>`;
            return `<span class="text-xs font-bold text-gray-400">-</span>`;
        }

        function renderSummary(steamData, playData) {
            function getTopGenres(data) {
                const counts = {};
                let total = 0;
                data.forEach(g => {
                    const genre = g.genre || '기타';
                    counts[genre] = (counts[genre] || 0) + 1;
                    total++;
                });
                return Object.entries(counts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 3)
                    .map(([name, count]) => ({ name, percent: Math.round((count/Math.max(1, total))*100) }));
            }

            function renderGenreBars(containerId, topGenres, colorClass) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                if(topGenres.length === 0) return;
                topGenres.forEach(g => {
                    container.insertAdjacentHTML('beforeend', `
                        <div class="flex items-center text-sm">
                            <span class="w-16 truncate text-gray-600 text-xs" title="${g.name}">${g.name}</span>
                            <div class="flex-1 ml-2 bg-gray-100 rounded-full h-2">
                                <div class="${colorClass} h-2 rounded-full transition-all duration-1000" style="width: ${g.percent}%"></div>
                            </div>
                            <span class="w-8 text-right text-xs font-bold text-gray-500">${g.percent}%</span>
                        </div>
                    `);
                });
            }

            renderGenreBars('steam-genre-summary', getTopGenres(steamData), 'bg-slate-600');
            renderGenreBars('play-genre-summary', getTopGenres(playData), 'bg-green-500');

            function getHallOfFame(data) {
                return [...data]
                    .filter(g => g.streak > 0)
                    .sort((a, b) => b.streak - a.streak)
                    .slice(0, 3);
            }

            function renderHofList(containerId, hofData) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                if(hofData.length === 0) {
                    container.innerHTML = '<li class="text-gray-400 text-xs italic py-2">아직 기록이 부족합니다.</li>';
                    return;
                }
                hofData.forEach((g, idx) => {
                    const icon = idx === 0 ? '🥇' : (idx === 1 ? '🥈' : '🥉');
                    container.insertAdjacentHTML('beforeend', `
                        <li class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded border border-gray-100">
                            <div class="flex items-center overflow-hidden">
                                <span class="mr-2 text-lg">${icon}</span>
                                <span class="truncate text-gray-700 font-medium text-sm" title="${g.title || g.name}">${g.title || g.name}</span>
                            </div>
                            <span class="text-xs font-bold text-orange-600 bg-orange-100 px-1.5 py-0.5 rounded shrink-0 shadow-sm">${g.streak}회 연속</span>
                        </li>
                    `);
                });
            }

            renderHofList('steam-hof-list', getHallOfFame(steamData));
            renderHofList('play-hof-list', getHallOfFame(playData));
        }

        function renderPlayStoreTable(container, data) {
            const slice = data.slice(0, 100);
            slice.forEach((game, index) => {
                const rankChangeHtml = getRankChangeHtml(game.rankChange);
                const streakHtml = game.streak >= 5 ? `<span class="ml-2 text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded border border-orange-200" title="${game.streak}회 연속 100위 진입"><i class="fa-solid fa-fire mr-0.5"></i>${game.streak}</span>` : '';
                const genreHtml = `<span class="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded border border-gray-200 mt-1 inline-block">${game.genre || '기타'}</span>`;

                const row = `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-3 text-center w-16 align-middle">
                            <div class="font-bold text-gray-700 text-sm">${index + 1}</div>
                            <div class="mt-0.5">${rankChangeHtml}</div>
                        </td>
                        <td class="p-3 font-medium text-gray-800 text-sm flex items-center gap-3 align-middle">
                            <img src="${game.icon || 'https://via.placeholder.com/24'}" alt="icon" class="w-10 h-10 rounded-lg shadow-sm" onerror="this.src='https://via.placeholder.com/32'">
                            <div class="flex flex-col items-start overflow-hidden w-full">
                                <div class="flex items-center w-full">
                                    <span class="truncate block max-w-[140px]" title="${game.title || game.name}">${game.title || game.name}</span>
                                    ${streakHtml}
                                </div>
                                ${genreHtml}
                            </div>
                        </td>
                        <td class="p-3 text-xs text-gray-500 text-right truncate max-w-[100px] align-middle" title="${game.developer}">${game.developer}</td>
                    </tr>
                `;
                container.insertAdjacentHTML('beforeend', row);
            });
        }

        function renderSteamTable(container, data) {
            const slice = data.slice(0, 100);
            slice.forEach((game, index) => {
                const rankChangeHtml = getRankChangeHtml(game.rankChange);
                const streakHtml = game.streak >= 5 ? `<span class="ml-2 text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded border border-orange-200" title="${game.streak}회 연속 100위 진입"><i class="fa-solid fa-fire mr-0.5"></i>${game.streak}</span>` : '';
                const genreHtml = `<span class="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded border border-gray-200 mt-1 inline-block">${game.genre || '기타'}</span>`;

                let priceHtml = `<span class="text-xs text-gray-400 font-medium">-</span>`;
                if (game.price) {
                    if (game.price.isFree) {
                        priceHtml = `<span class="text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-1 rounded-full shadow-sm">무료 (Free)</span>`;
                    } else if (game.price.isDiscounted) {
                        priceHtml = `
                            <div class="flex flex-col items-end justify-center">
                                <div class="flex items-center gap-1.5 mb-0.5">
                                    <span class="text-[11px] font-black text-white bg-emerald-600 px-1.5 py-0.5 rounded shadow-sm">-${game.price.discountPercent}%</span>
                                    <span class="text-xs font-bold text-gray-900">${game.price.final}</span>
                                </div>
                                <span class="text-[11px] text-gray-400 line-through font-medium">${game.price.initial}</span>
                            </div>
                        `;
                    } else {
                        priceHtml = `<span class="text-xs font-bold text-gray-700">${game.price.final}</span>`;
                    }
                }

                const row = `
                    <tr class="hover:bg-slate-100 transition-colors">
                        <td class="p-3 text-center w-16 align-middle">
                            <div class="font-bold text-gray-700 text-sm">${index + 1}</div>
                            <div class="mt-0.5">${rankChangeHtml}</div>
                        </td>
                        <td class="p-3 font-medium text-gray-800 text-sm flex items-center gap-3 align-middle">
                            <img src="${game.icon || 'https://store.cloudflare.steamstatic.com/public/images/v6/logo_steam_footer.png'}" alt="icon" class="w-16 h-8 object-cover rounded shadow-sm border border-gray-200 flex-shrink-0" onerror="this.style.display='none'">
                            <div class="flex flex-col items-start overflow-hidden w-full">
                                <div class="flex items-center w-full">
                                    <span class="truncate block max-w-[140px]" title="${game.name}">${game.name}</span>
                                    ${streakHtml}
                                </div>
                                ${genreHtml}
                            </div>
                        </td>
                        <td class="p-3 text-right align-middle shrink-0">${priceHtml}</td>
                        <td class="p-3 text-xs text-gray-500 text-right truncate max-w-[100px] align-middle" title="${game.developer}">${game.developer}</td>
                    </tr>
                `;
                container.insertAdjacentHTML('beforeend', row);
            });
        }

        function generateMockData(platform) {
            let mock = [];
            for(let i=1; i<=100; i++) {
                mock.push({
                    title: `데이터 대기중`,
                    name: `데이터 대기중`,
                    developer: `-`,
                    genre: '-',
                    rankChange: 0,
                    streak: 0
                });
            }
            return mock;
        }
    </script>
</body>
</html>
